name: Nightly Build

on:
  push:
    branches: [main]

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  web-deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: vars.CLOUDFLARE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=orbitra --commit-dirty=true

  eas-preview:
    runs-on: ubuntu-latest
    needs: checks
    if: vars.EAS_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview
        run: eas build --profile preview --platform all --non-interactive

  tag-nightly:
    runs-on: ubuntu-latest
    needs: checks
    if: always() && needs.checks.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tag nightly
        run: |
          TAG="nightly-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          git tag "$TAG"
          git push origin "$TAG"
